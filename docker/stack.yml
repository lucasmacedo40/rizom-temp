version: '3.8'

# Deploy: export $(cat /opt/rizomtemp/.env | grep -v '^#' | xargs) && \
#         docker stack deploy -c /opt/rizomtemp/docker/stack.yml rizomtemp --with-registry-auth

networks:
  public:
    external: true        # rede compartilhada com Traefik
  internal:
    driver: overlay       # rede privada do rizomtemp

volumes:
  postgres_data:
  mosquitto_data:

configs:
  mosquitto_conf:
    file: ./mosquitto.prod.conf

services:

  # ─── Frontend (Nginx + React) ────────────────────────────────────────────────
  frontend:
    image: ghcr.io/lucasmacedo40/rizomtemp-frontend:latest
    networks:
      - public
      - internal
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.rizomtemp.rule=Host(`temp.rizom.com.br`)"
        - "traefik.http.routers.rizomtemp.entrypoints=websecure"
        - "traefik.http.routers.rizomtemp.tls=true"
        - "traefik.http.routers.rizomtemp.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.rizomtemp.loadbalancer.server.port=80"

  # ─── Backend (Node.js API) ───────────────────────────────────────────────────
  backend:
    image: ghcr.io/lucasmacedo40/rizomtemp-backend:latest
    networks:
      - internal
    environment:
      PORT: "3000"
      NODE_ENV: production
      DATABASE_URL: postgresql://rizomtemp:${DB_PASSWORD}@postgres:5432/rizomtemp
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: "7d"
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      FRONTEND_URL: https://temp.rizom.com.br
      REPORT_TIMEZONE: America/Sao_Paulo
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_STARTER_MONTHLY: ${STRIPE_PRICE_STARTER_MONTHLY}
      STRIPE_PRICE_STARTER_YEARLY: ${STRIPE_PRICE_STARTER_YEARLY}
      STRIPE_PRICE_OPERADOR_MONTHLY: ${STRIPE_PRICE_OPERADOR_MONTHLY}
      STRIPE_PRICE_OPERADOR_YEARLY: ${STRIPE_PRICE_OPERADOR_YEARLY}
      STRIPE_PRICE_MASTER_MONTHLY: ${STRIPE_PRICE_MASTER_MONTHLY}
      STRIPE_PRICE_MASTER_YEARLY: ${STRIPE_PRICE_MASTER_YEARLY}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME}
      SEED_CLIENT_NAME: ${SEED_CLIENT_NAME}
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s

  # ─── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    networks:
      - internal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: rizomtemp
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: rizomtemp
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager

  # ─── Mosquitto (MQTT para ESP32) ─────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    networks:
      - internal
    ports:
      - "1883:1883"    # ESP32 conecta diretamente nesta porta
    volumes:
      - mosquitto_data:/mosquitto/data
    configs:
      - source: mosquitto_conf
        target: /mosquitto/config/mosquitto.conf
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager
