# Rizom Temp — Nginx
# Substitua rizomtemp.seudominio.com pelo seu subdomínio real

server {
    listen 80;
    server_name rizomtemp.seudominio.com;

    # Frontend estático
    root /opt/rizomtemp/frontend/dist;
    index index.html;

    # API — proxy para o Node.js
    location ~ ^/(auth|equipamentos|leituras|alertas|relatorios|health|provisioning|configuracoes) {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;
    }

    # SPA — todas as outras rotas servem o index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
