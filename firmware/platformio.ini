; Rizom Temp — Firmware (multi-hardware)
;
; Cada hardware tem seu próprio subdiretório com platformio.ini independente.
; Para compilar/gravar, navegue até o subdiretório correspondente:
;
;   cd esp01       && pio run --target upload   ; ESP-01 (1 MB)
;   cd esp32c3     && pio run --target upload   ; ESP32-C3 Super Mini
;   cd wemos       && pio run --target upload   ; Wemos D1 Mini
;   cd wemos-simple && pio run --target upload  ; Wemos D1 Mini (portal simples)
;
; Monitor serial:
;   cd <subdir> && pio device monitor
;
; Este arquivo existe apenas para compatibilidade com IDEs que esperam
; um platformio.ini no diretório raiz de firmware/.
; Não use este arquivo para build — use os subdiretórios.
