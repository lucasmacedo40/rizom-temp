; Rizom Temp — Firmware v2.0
; PlatformIO Configuration for ESP32-C3 Super Mini
; 
; This file configures:
; - Board: ESP32-C3 Super Mini with 4MB Flash
; - Framework: Arduino
; - Baud rates: 115200 Serial, 460800 Upload
; - All required dependencies
;
; Upload: PlatformIO: Upload (Ctrl+Alt+U)
; Monitor: PlatformIO: Serial Monitor (Ctrl+Alt+S)
; Clean: PlatformIO: Clean (Ctrl+Alt+Shift+C)

[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino

; Serial configuration
monitor_speed = 115200
upload_speed = 460800
monitor_filters = esp32_exception_decoder, log2file

; Build options
build_flags = 
  -DCORE_DEBUG_LEVEL=0

; Library dependencies - all auto-installed by PlatformIO
lib_deps =
  PubSubClient @ ^2.8
  OneWire @ ^2.3.4
  DallasTemperature @ ^3.9.7
  Adafruit SSD1306 @ ^2.5.7
  Adafruit GFX Library @ ^1.11.9
  ArduinoJson @ ^7.0.4

; Extra settings
upload_protocol = esptool
upload_port = 

; Uncomment the line below if you need to specify a specific COM port
; upload_port = COM3      # Windows example
; upload_port = /dev/ttyUSB0  # Linux example
; upload_port = /dev/cu.usbserial-0001  # macOS example

; Partition scheme for SPIFFS support
board_build.partitions = default_4MB.csv

[env:d1_mini]
platform = espressif8266
board = d1_mini
framework = arduino
src_dir = .
src_filter = +<rizom_temp_WEMOS_D1.ino> -<rizom_temp_ESPC32.ino> -<rizom_temp_esp01.ino> -<src/>
board_build.filesystem = littlefs
monitor_speed = 115200
upload_speed = 921600
lib_deps =
  PubSubClient @ ^2.8
  OneWire @ ^2.3.4
  DallasTemperature @ ^3.9.7
