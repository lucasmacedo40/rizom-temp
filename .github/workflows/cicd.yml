name: CI/CD

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  # ─── Backend: syntax check ────────────────────────────────────────────────────
  ci-backend:
    name: Backend — Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --omit=dev
        working-directory: backend

      - name: Check JS syntax
        run: find src -name '*.js' | xargs node --check
        working-directory: backend

  # ─── Frontend: lint + build ───────────────────────────────────────────────────
  ci-frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  # ─── Deploy: só roda em push para main ───────────────────────────────────────
  deploy:
    name: Deploy → VPS
    runs-on: ubuntu-latest
    needs: [ci-backend, ci-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.VPS_DEPLOY_PATH }}

            echo "=== Pulling latest code ==="
            git pull origin main

            echo "=== Installing backend dependencies ==="
            cd backend
            npm ci --omit=dev
            cd ..

            echo "=== Building frontend ==="
            cd frontend
            npm ci
            npm run build
            cd ..

            echo "=== Running migrations ==="
            cd backend
            NODE_ENV=production node src/migrations/run.js
            cd ..

            echo "=== Restarting backend ==="
            pm2 reload rizomtemp-backend --update-env

            echo "=== Health check ==="
            sleep 3
            curl -sf http://localhost:3000/health && echo "Backend OK" || echo "WARN: health check failed"
