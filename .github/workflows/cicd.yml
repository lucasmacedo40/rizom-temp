name: CI/CD

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  # ─── Backend: syntax check ────────────────────────────────────────────────────
  ci-backend:
    name: Backend — Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --omit=dev
        working-directory: backend

      - name: Check JS syntax
        run: find src -name '*.js' | xargs node --check
        working-directory: backend

  # ─── Frontend: lint + build ───────────────────────────────────────────────────
  ci-frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  # ─── Deploy: roda no próprio VPS via self-hosted runner ─────────────────────
  deploy:
    name: Deploy → VPS
    runs-on: self-hosted
    needs: [ci-backend, ci-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Pull latest code
        run: git -C /opt/rizomtemp pull origin main

      - name: Install backend dependencies
        run: npm ci --omit=dev
        working-directory: /opt/rizomtemp/backend

      - name: Build frontend
        run: npm ci && npm run build
        working-directory: /opt/rizomtemp/frontend

      - name: Run migrations
        run: NODE_ENV=production node src/migrations/run.js
        working-directory: /opt/rizomtemp/backend

      - name: Restart backend
        run: pm2 reload rizomtemp-backend --update-env

      - name: Health check
        run: |
          sleep 3
          curl -sf http://localhost:3000/health && echo "Backend OK"
