name: CI/CD

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  # ─── Backend: syntax check ────────────────────────────────────────────────────
  ci-backend:
    name: Backend — Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --omit=dev
        working-directory: backend

      - name: Check JS syntax
        run: find src -name '*.js' | xargs node --check
        working-directory: backend

  # ─── Frontend: lint + build ───────────────────────────────────────────────────
  ci-frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  # ─── Build e push das imagens Docker → GHCR ──────────────────────────────────
  build-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [ci-backend, ci-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ghcr.io/lucasmacedo40/rizomtemp-backend:latest

      - name: Build e push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/lucasmacedo40/rizomtemp-frontend:latest

  # ─── Deploy: self-hosted runner no VPS ───────────────────────────────────────
  deploy:
    name: Deploy → VPS
    runs-on: self-hosted
    needs: [build-push]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Pull imagens atualizadas
        run: |
          docker pull ghcr.io/lucasmacedo40/rizomtemp-backend:latest
          docker pull ghcr.io/lucasmacedo40/rizomtemp-frontend:latest

      - name: Deploy stack
        run: |
          export $(cat /opt/rizomtemp/.env | grep -v '^#' | grep '=' | xargs)
          docker stack deploy -c /opt/rizomtemp/docker/stack.yml rizomtemp --with-registry-auth
