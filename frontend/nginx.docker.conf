server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy via /api/* (prefixo usado pelo axios no frontend)
    location ~ ^/api/(auth|equipamentos|leituras|alertas|relatorios|health|provisioning|configuracoes|billing|webhooks) {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://rizomtemp_backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;
    }

    # Proxy direto apenas para rotas que não conflitam com o SPA
    location ~ ^/(health|provisioning) {
        proxy_pass http://rizomtemp_backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;
    }

    # SPA — todas as rotas servem o index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
