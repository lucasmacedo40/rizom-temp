server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy para o backend Node.js (nome do serviço no Swarm)
    location ~ ^/(auth|equipamentos|leituras|alertas|relatorios|health|provisioning|configuracoes) {
        proxy_pass http://rizomtemp_backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;
    }

    # SPA — todas as rotas servem o index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
